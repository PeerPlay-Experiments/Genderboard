<!DOCTYPE html> 
<html lang="en">
  <head> 
    <title>Gender%</title> 
    <meta charset="UTF-8">
    <script> /* copilot failed me so thx chatgpt */
document.addEventListener("DOMContentLoaded", () => {

const sliders = {
  masc: { id: 'masc', color: '#336AFF' },
  fem: { id: 'fem', color: '#FF69B4' },
  nb: { id: 'nb', color: '#FFD700' },
  agender: { id: 'agender', color: '#0CFF6B' },
  fluid: { id: 'fluid', color: '#DA70D6' },
  other: { id: 'other', color: '#A9A9A9' },
};

function updateGenderBar() {
  const values = {};
  let total = 0;

  Object.keys(sliders).forEach(key => {
    values[key] = parseInt(document.getElementById(sliders[key].id).value);
    total += values[key];
  });

  if (total === 0) {
    document.getElementById('genderpercentbar').style.background = '#333';
    return;
  }

  let gradientStops = [];
  let currentPosition = 0;

  Object.keys(sliders).forEach(key => {
    const percentage = (values[key] / total) * 100;

    gradientStops.push(`${sliders[key].color} ${currentPosition}%`);
    currentPosition += percentage;
    gradientStops.push(`${sliders[key].color} ${currentPosition}%`);
  });

  const gradient = `linear-gradient(to right, ${gradientStops.join(', ')})`;
  document.getElementById('genderpercentbar').style.background = gradient;
}

Object.keys(sliders).forEach(key => {
  document.getElementById(sliders[key].id)
    .addEventListener("input", updateGenderBar);
});

updateGenderBar();

/* EXPORT */

function exportGenFile() {
  const traits = {};

  Object.keys(sliders).forEach(key => {
    const value = document.getElementById(sliders[key].id).value;
    traits[key] = { perc: parseInt(value) };
  });

  const genData = {
    version: 1,
    timeline: [{
      date: new Date().toISOString().split("T")[0],
      traits: traits
    }]
  };

  const blob = new Blob(
    [JSON.stringify(genData, null, 2)],
    { type: "application/json" }
  );

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "identity.gen%";
  link.click();
}

document.getElementById("exportBtn")
  .addEventListener("click", exportGenFile);

/* IMPORT */

function importGenFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = JSON.parse(e.target.result);
    const traits = data.timeline[0].traits;

    Object.keys(traits).forEach(key => {
      if (sliders[key]) {
        document.getElementById(sliders[key].id).value = traits[key].perc;
      }
    });

    updateGenderBar();
  };

  reader.readAsText(file);
}

document.getElementById("importFile")
  .addEventListener("change", importGenFile);

});
</script>
