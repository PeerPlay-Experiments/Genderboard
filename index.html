<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Gender%</title>
    <meta charset="UTF-8">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Alata&display=swap');
      .alata-regular {
        font-family: "Alata", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      /* too lazy to format this */
#masc {
  accent-color: #FF6B6B; /* red for masculine */
}

#fem {
  accent-color: #FF69B4; /* pink for feminine */
}

#nb {
  accent-color: #FFD700; /* gold for non-binary */
}

#agender {
  accent-color: #00CED1; /* turquoise for agender */
}

#fluid {
  accent-color: #DA70D6; /* orchid for fluid */
}

#other {
  accent-color: #A9A9A9; /* gray for other */
}

/* Keep submit button separate */
#SUBMIT {
  background-color: #555;
  color: #FFF;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#SUBMIT:hover {
  background-color: #777;
}
      body {
        background-color: #111;
        color: #DDD;
        font-family: Alata, SF Pro, Arial, sans-serif;
      }
      #genderpercentbar {
        width: 100%;
        height: 30px;
        background-color: #333;
        border-radius: 10px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <h1>Gen%</h1>
    <div id="genderpercentbar"></div>
    <input type="range" id="masc">
    <input type="range" id="fem">
    <input type="range" id="nb">
    <input type="range" id="agender">
    <input type="range" id="fluid">
    <input type="range" id="other">
    <input type=submit id="SUBMIT">
  </body>
</html>
